name: Build and Push nexttool-blog Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ghcr.io/mikehung1997/nexttool-blog:latest \
            -t ghcr.io/mikehung1997/nexttool-blog:${{ github.run_number }} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/mikehung1997/nexttool-blog:latest
          docker push ghcr.io/mikehung1997/nexttool-blog:${{ github.run_number }}